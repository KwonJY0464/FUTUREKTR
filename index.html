<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AGGREKaToR</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #222; --card: #fdfdfd; --border: #e0e0e0; --accent: #0056b3; --left-width: 400px; }
        [data-theme='dark'] { --bg: #121212; --text: #e0e0e0; --card: #1e1e1e; --border: #333; --accent: #4dabff; }

        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 25px; border-bottom: 1px solid var(--border); }
        
        /* 💡 상단 모드 전환 버튼 스타일 추가 */
        .mode-tabs { display: flex; gap: 10px; align-items: center; }
        .mode-btn { 
            padding: 8px 18px; font-size: 1.1rem; font-weight: bold; border: 1px solid var(--border); border-radius: 20px; 
            cursor: pointer; transition: all 0.2s ease; background: var(--bg); color: var(--text); font-family: 'Nanum Myeongjo', serif;
        }
        .mode-btn.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 10px rgba(0, 86, 179, 0.2); }
        .mode-btn:hover:not(.active) { background: rgba(0, 86, 179, 0.05); }

        /* 조절 가능한 레이아웃 설정 */
        .wrapper { display: flex; flex: 1; min-height: 0; position: relative; transition: opacity 0.3s ease; } /* 페이드 효과 추가 */
        
        .pane-left { width: var(--left-width); min-width: 300px; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        
        .resizer { 
            width: 8px; cursor: col-resize; background: transparent; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .resizer:hover { background: rgba(0, 86, 179, 0.1); }
        .resizer::after { content: "||"; color: var(--border); font-size: 10px; }

        .pane-right { flex: 1; display: grid; grid-template-rows: 1fr 1fr; gap: 15px; padding: 15px; min-width: 400px; }

        .pane { background: var(--card); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .pane-header { padding: 10px 15px; font-weight: bold; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.02); font-size: 0.9rem; }
        .scroll-content { flex: 1; overflow-y: auto; padding: 5px 10px; }
        
        /* 뉴스 아이템 스타일 */
        .news-item { padding: 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .news-item:hover { background: rgba(0, 86, 179, 0.03); }
        .news-item h3 { font-size: 0.92rem; margin: 0 0 5px 0; color: var(--accent); line-height: 1.4; }
        .news-item p { font-size: 0.85rem; margin: 0; line-height: 1.5; color: var(--text); opacity: 0.9; }
        .news-item .date { font-size: 0.72rem; color: #999; margin-top: 6px; display: block; }

        /* 국회 아이템 스타일 추가 */
        .assembly-item { padding: 12px; border-bottom: 1px solid var(--border); }
        .assembly-item h3 { font-size: 0.95rem; margin: 0 0 5px 0; color: var(--accent); line-height: 1.4; }
        .assembly-item p { font-size: 0.82rem; margin: 0; line-height: 1.5; color: var(--text); opacity: 0.9; }
        .assembly-summary { padding: 15px; font-size: 0.95rem; line-height: 1.6; color: var(--text); }

        .tab-btn { padding: 2px 8px; border-radius: 12px; border: 1px solid var(--accent); background: none; color: var(--accent); cursor: pointer; font-size: 0.7rem; margin-left: 4px; }
        .tab-btn.active { background: var(--accent); color: white; }
    </style>
</head>
<body data-theme="light">
    <header>
        <div class="mode-tabs">
            <button id="mode-news" class="mode-btn active" onclick="switchMode('news')">뉴스수집기</button>
            <button id="mode-assembly" class="mode-btn" onclick="switchMode('assembly')">국회수집기</button>
        </div>
        <button style="background:none; border:none; font-size:1.4rem; cursor:pointer;" onclick="toggleTheme()" id="themeIcon">🌙</button>
    </header>

    <div class="wrapper" id="mainWrapper">
        <div class="pane-left">
            <div class="pane" style="height:100%">
                <div class="pane-header"><div id="pane1-header-left">1. 인기뉴스</div> <span id="time-1" style="font-size:0.7rem; color:#999;"></span></div>
                <div id="pane1-content" class="scroll-content"></div>
            </div>
        </div>

        <div class="resizer" id="resizer"></div>

        <div class="pane-right">
            <div class="pane">
                <div class="pane-header"><div id="pane2-header-left">2. 부처/기관 <span id="pane2-tabs"></span></div><span id="time-2" style="font-size:0.7rem; color:#999;"></span></div>
                <div id="pane2-content" class="scroll-content"></div>
            </div>
            <div class="pane">
                <div class="pane-header"><div id="pane3-header-left">3. 모니터링 <span id="pane3-tabs"></span></div><span id="time-3" style="font-size:0.7rem; color:#999;"></span></div>
                <div id="pane3-content" class="scroll-content"></div>
            </div>
        </div>
    </div>

    <script>
        let allData = null;
        let currentMode = 'news'; // 현재 모드 상태 저장
        
        // 너비 조절 로직
        const resizer = document.getElementById('resizer');
        const wrapper = document.getElementById('mainWrapper');
        let isResizing = false;

        resizer.addEventListener('mousedown', () => isResizing = true);
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const offsetLeft = e.clientX;
            if (offsetLeft > 300 && offsetLeft < window.innerWidth - 400) {
                document.documentElement.style.setProperty('--left-width', `${offsetLeft}px`);
            }
        });
        document.addEventListener('mouseup', () => isResizing = false);

        function toggleTheme() {
            const b = document.body; const isDark = b.getAttribute('data-theme') === 'dark';
            b.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('themeIcon').innerText = isDark ? '🌙' : '☀️';
        }

        function renderNews(targetId, items) {
            const container = document.getElementById(targetId);
            container.innerHTML = (items && items.length > 0) ? items.map(item => `
                <div class="news-item" onclick="window.open('${item.link}', '_blank')">
                    <h3>${item.title.replace(/<[^>]*>?/gm, '')}</h3>
                    <p>${item.ai_summary}</p>
                    <span class="date">${item.formatted_date}</span>
                </div>`).join('') : "<div style='padding:20px; color:#999;'>조건에 맞는 뉴스가 없습니다.</div>";
        }

        function switchTab(p, kw, btn) {
            document.querySelectorAll(`#pane${p}-tabs .tab-btn`).forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); renderNews(`pane${p}-content`, allData[`pane${p}`][kw]);
        }

        // 💡 핵심: 모드 전환 함수
        async function switchMode(mode) {
            if (currentMode === mode && document.getElementById('pane1-content').innerHTML !== '') return;
            currentMode = mode;
            
            // 버튼 활성화 UI 변경
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`mode-${mode}`).classList.add('active');
            
            // 화면 페이드 아웃
            wrapper.style.opacity = 0;
            
            setTimeout(async () => {
                if (mode === 'news') {
                    await loadNewsData();
                } else {
                    await loadAssemblyData();
                }
                // 화면 페이드 인
                wrapper.style.opacity = 1;
            }, 300);
        }

        // 기존 뉴스 로딩 함수
        async function loadNewsData() {
            // 패널 제목을 뉴스용으로 복구
            document.getElementById('pane1-header-left').innerHTML = `1. 인기뉴스`;
            document.getElementById('pane2-header-left').innerHTML = `2. 부처/기관 <span id="pane2-tabs"></span>`;
            document.getElementById('pane3-header-left').innerHTML = `3. 모니터링 <span id="pane3-tabs"></span>`;

            try {
                const res = await fetch(`news.json?t=${Date.now()}`); 
                allData = await res.json();
                renderNews('pane1-content', allData.pane1);
                ['pane2', 'pane3'].forEach(id => {
                    const n = id.slice(-1); const kws = Object.keys(allData[id]);
                    const t = document.getElementById(`${id}-tabs`);
                    t.innerHTML = kws.map((kw, i) => `<button class="tab-btn ${i===0?'active':''}" onclick="switchTab(${n},'${kw}',this)">${kw}</button>`).join('');
                    switchTab(n, kws[0], t.firstChild);
                });
                const ts = `업데이트: ${allData.last_updated.substring(11, 16)}`;
                ['1','2','3'].forEach(n => document.getElementById(`time-${n}`).innerText = ts);
            } catch (e) { 
                document.getElementById('pane1-content').innerHTML = "<div style='padding:20px; color:#999;'>뉴스 데이터를 불러올 수 없습니다. 봇이 아직 작동하지 않았거나 오류가 발생했습니다.</div>";
                document.getElementById('pane2-content').innerHTML = "";
                document.getElementById('pane3-content').innerHTML = "";
            }
        }

        // 신규 국회 로딩 함수
        async function loadAssemblyData() {
            // 패널 제목을 국회용으로 변경
            document.getElementById('pane1-header-left').innerHTML = `🏛️ 1. 핵심 의사일정 (산자/과방/환노/본회의)`;
            document.getElementById('pane2-header-left').innerHTML = `📜 2. 입법/정책 동향`;
            document.getElementById('pane3-header-left').innerHTML = `🤖 3. Gemma 3 27B 요약 브리핑`;

            try {
                const response = await fetch(`assembly.json?t=${Date.now()}`);
                const data = await response.json();
                
                // 1. 일정 렌더링
                let scheduleHTML = '';
                if(data.schedules && data.schedules.length > 0) {
                    scheduleHTML = data.schedules.map(item => `
                        <div class="assembly-item">
                            <h3>[${item.date}] ${item.title}</h3>
                            <p>🕒 ${item.time} | 📍 ${item.committee} (${item.location})</p>
                        </div>
                    `).join('');
                } else {
                    scheduleHTML = "<div style='padding:20px; color:#999;'>예정된 주요 일정이 없습니다.</div>";
                }
                document.getElementById('pane1-content').innerHTML = scheduleHTML;

                // 2. 법안 (임시 공사 중 화면)
                document.getElementById('pane2-content').innerHTML = `
                    <div style="padding:40px 20px; color:var(--text); opacity:0.8; text-align:center;">
                        <span style="font-size:2.5rem;">🚧</span><br><br>
                        <strong>의안(법안) 수집 API 연동 대기 중</strong><br><br>
                        <span style="font-size:0.85rem; color:#888;">국회 활용 승인이 완료되면<br>이곳에 KTR 관련 법안이 자동 업데이트됩니다.</span>
                    </div>
                `;

                // 3. AI 요약 브리핑
                const summaryHtml = data.summary ? data.summary.replace(/\n/g, '<br>') : "요약 정보가 없습니다.";
                document.getElementById('pane3-content').innerHTML = `
                    <div class="assembly-summary">${summaryHtml}</div>
                `;

                // 업데이트 시간 표시
                const ts = `업데이트: ${data.last_updated.substring(11, 16)}`;
                ['1','2','3'].forEach(n => document.getElementById(`time-${n}`).innerText = ts);
                
            } catch (e) {
                document.getElementById('pane1-content').innerHTML = "<div style='padding:20px; color:#999;'>국회 데이터(assembly.json)를 수집 중이거나 아직 생성되지 않았습니다.</div>";
                document.getElementById('pane2-content').innerHTML = "";
                document.getElementById('pane3-content').innerHTML = "";
                ['1','2','3'].forEach(n => document.getElementById(`time-${n}`).innerText = "");
            }
        }

        // 초기 실행: 뉴스 모드로 시작
        switchMode('news');
    </script>
</body>
</html>
