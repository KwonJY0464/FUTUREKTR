<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>뉴스수집기</title>
    <style>
        :root { --bg: #ffffff; --text: #222; --card: #f8f9fa; --border: #ddd; --accent: #0056b3; }
        [data-theme='dark'] { --bg: #121212; --text: #e0e0e0; --card: #1e1e1e; --border: #333; --accent: #4dabff; }
        body { background: var(--bg); color: var(--text); font-family: 'Malgun Gothic', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; transition: 0.3s; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 25px; border-bottom: 1px solid var(--border); }
        h1 { font-family: "Gungsuh", "궁서", serif; font-size: 1.8rem; margin: 0; }
        .main-container { display: grid; grid-template-columns: 400px 1fr; grid-template-rows: 1fr 1fr; gap: 15px; padding: 15px; flex-grow: 1; overflow: hidden; }
        .pane { background: var(--card); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .pane-1 { grid-row: 1 / span 2; }
        .pane-header { padding: 10px 15px; font-weight: bold; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.03); }
        .update-time { font-size: 0.75rem; color: #999; font-weight: normal; }
        .scroll-content { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .news-item { padding: 12px; border-bottom: 1px dotted var(--border); }
        .news-item a { color: var(--accent); text-decoration: none; font-weight: bold; }
        .news-item p { font-size: 0.85rem; margin: 5px 0; color: #777; }
        .news-item span { font-size: 0.75rem; color: #999; }
        .tabs { display: flex; gap: 5px; align-items: center; }
        .tab-btn { padding: 3px 8px; border-radius: 15px; border: 1px solid var(--accent); background: none; color: var(--accent); cursor: pointer; font-size: 0.75rem; transition: 0.2s; }
        .tab-btn.active { background: var(--accent); color: white; }
    </style>
</head>
<body data-theme="light">
    <header>
        <h1>뉴스수집기</h1>
        <button style="background:none; border:none; font-size:1.5rem; cursor:pointer;" onclick="toggleTheme()" id="themeIcon">🌙</button>
    </header>
    <div class="main-container">
        <div class="pane pane-1">
            <div class="pane-header">1. 속보 (48h) <span class="update-time" id="time-pane1"></span></div>
            <div id="pane1-content" class="scroll-content">로딩 중...</div>
        </div>
        <div class="pane">
            <div class="pane-header">
                <div class="tabs">2. 부처/기관 <div id="pane2-tabs" style="margin-left:10px"></div></div>
                <span class="update-time" id="time-pane2"></span>
            </div>
            <div id="pane2-content" class="scroll-content">탭을 선택하세요.</div>
        </div>
        <div class="pane">
            <div class="pane-header">
                <div class="tabs">3. 키워드 모니터링 <div id="pane3-tabs" style="margin-left:10px"></div></div>
                <span class="update-time" id="time-pane3"></span>
            </div>
            <div id="pane3-content" class="scroll-content">탭을 선택하세요.</div>
        </div>
    </div>
    <script>
        let allData = null;
        function toggleTheme() {
            const body = document.body; const icon = document.getElementById('themeIcon');
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            icon.innerText = isDark ? '🌙' : '☀️';
        }
        function renderNews(targetId, items) {
            const container = document.getElementById(targetId);
            container.innerHTML = (items && items.length > 0) ? items.map(item => `
                <div class="news-item">
                    <a href="${item.link}" target="_blank">${item.title.replace(/<[^>]*>?/gm, '')}</a>
                    <p>${item.description.replace(/<[^>]*>?/gm, '')}</p>
                    <span>${item.pubDate}</span>
                </div>`).join('') : "관련 뉴스가 없습니다.";
        }
        function switchTab(paneNum, kw, btn) {
            document.querySelectorAll(`#pane${paneNum}-tabs .tab-btn`).forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderNews(`pane${paneNum}-content`, allData[`pane${paneNum}`][kw]);
        }
        async function init() {
            try {
                const res = await fetch(`news.json?t=${Date.now()}`);
                allData = await res.json();
                renderNews('pane1-content', allData.pane1);
                
                ['pane2', 'pane3'].forEach(paneId => {
                    const num = paneId.slice(-1);
                    const keywords = Object.keys(allData[paneId]);
                    const tabContainer = document.getElementById(`${paneId}-tabs`);
                    tabContainer.innerHTML = keywords.map((kw, i) => 
                        `<button class="tab-btn ${i===0?'active':''}" onclick="switchTab(${num}, '${kw}', this)">${kw}</button>`
                    ).join('');
                    switchTab(num, keywords[0], tabContainer.firstChild);
                });

                const timeStr = `업데이트: ${allData.last_updated.substring(11, 16)}`;
                ['1','2','3'].forEach(n => document.getElementById(`time-pane${n}`).innerText = timeStr);
            } catch (e) { console.error(e); }
        }
        init();
    </script>
</body>
</html>
