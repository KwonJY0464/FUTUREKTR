<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KTR 트렌드 모니터링</title>
    <style>
        :root { --bg: #ffffff; --text: #333333; --card: #f9f9f9; }
        [data-theme='dark'] { --bg: #1a1a1a; --text: #f0f0f0; --card: #2d2d2d; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; transition: 0.3s; margin: 0; }
        header { display: flex; justify-content: space-between; padding: 20px; border-bottom: 1px solid #ccc; }
        .container { display: flex; flex-direction: column; gap: 30px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .column { width: 100%; }
        .news-card { background: var(--card); padding: 15px; margin-bottom: 15px; border-radius: 8px; font-size: 0.9em; }
        .news-card a { color: inherit; text-decoration: none; font-weight: bold; }
        h2 { border-left: 5px solid #0056b3; padding-left: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>프로젝트명: KTR 실시간 뉴스 봇</h1>
        <button onclick="toggleTheme()">다크/라이트 모드</button>
    </header>
    <div class="container">
        <div class="column"><h2>주요 뉴스</h2><div id="major-news"></div></div>
        <div class="column"><h2>산업부 소식</h2><div id="industry-news"></div></div>
        <div class="column"><h2>트럼프 동향</h2><div id="trump-news"></div></div>
    </div>

    <script>
        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            document.body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        async function loadNews() {
            const res = await fetch('news.json');
            const data = await res.json();
            renderSection('major-news', data.major);
            renderSection('industry-news', data.industry);
            renderSection('trump-news', data.trump);
        }

        function renderSection(id, items) {
            const div = document.getElementById(id);
            div.innerHTML = items.map(item => `
                <div class="news-card">
                    <a href="${item.link}" target="_blank">${item.title.replace(/<[^>]*>?/gm, '')}</a>
                    <p>${item.description.replace(/<[^>]*>?/gm, '').substring(0, 100)}...</p>
                </div>
            `).join('');
        }
        loadNews();
    </script>
</body>
</html>
