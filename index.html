<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>뉴스수집기</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo&display=swap" rel="stylesheet">

<style>
    /* 2. CSS 설정 */
    :root { 
        --bg: #ffffff; 
        --text: #222; 
        --card: #f8f9fa; 
        --border: #ddd; 
        --accent: #0056b3; 
    }
    
    [data-theme='dark'] { 
        --bg: #121212; 
        --text: #e0e0e0; 
        --card: #1e1e1e; 
        --border: #333; 
        --accent: #4dabff; 
    }

    body { 
        background: var(--bg); 
        color: var(--text); 
        font-family: 'Malgun Gothic', sans-serif; /* 본문은 가독성을 위해 고딕 유지 */
        margin: 0; 
        height: 100vh; 
        display: flex; 
        flex-direction: column; 
    }

    header { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        padding: 10px 25px; 
        border-bottom: 1px solid var(--border); 
    }

    /* 💡 h1 폰트를 나눔명조로 변경했습니다 */
    h1 { 
        font-family: 'Nanum Myeongjo', serif; 
        font-size: 1.8rem; 
        margin: 0; 
        font-weight: bold; /* 명조체는 굵게 했을 때 가독성이 더 좋습니다 */
    }
</style>
</head>
<body data-theme="light">
    <header><h1>뉴스수집기</h1><button style="background:none; border:none; font-size:1.5rem; cursor:pointer;" onclick="toggleTheme()" id="themeIcon">🌙</button></header>
    <div class="main-container">
        <div class="pane pane-1"><div class="pane-header">1. 속보 <span id="time-1" class="update-time"></span></div><div id="pane1-content" class="scroll-content"></div></div>
        <div class="pane"><div class="pane-header"><div>2. 부처/기관 <span id="pane2-tabs"></span></div><span id="time-2" class="update-time"></span></div><div id="pane2-content" class="scroll-content"></div></div>
        <div class="pane"><div class="pane-header"><div>3. 키워드 모니터링 <span id="pane3-tabs"></span></div><span id="time-3" class="update-time"></span></div><div id="pane3-content" class="scroll-content"></div></div>
    </div>
    <script>
        let allData = null;
        function toggleTheme() {
            const body = document.body; const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('themeIcon').innerText = isDark ? '🌙' : '☀️';
        }
        function renderNews(targetId, items) {
            const container = document.getElementById(targetId);
            container.innerHTML = (items || []).map(item => `
                <div class="news-item" onclick="window.open('${item.link}', '_blank')">
                    <h3>${item.title.replace(/<[^>]*>?/gm, '')}</h3>
                    <p>${item.ai_summary}</p>
                    <span style="font-size:0.7rem; color:#999;">${item.pubDate}</span>
                </div>`).join('');
        }
        function switchTab(p, kw, btn) {
            document.querySelectorAll(`#pane${p}-tabs .tab-btn`).forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); renderNews(`pane${p}-content`, allData[`pane${p}`][kw]);
        }
        async function init() {
            try {
                const res = await fetch(`news.json?t=${Date.now()}`); allData = await res.json();
                renderNews('pane1-content', allData.pane1);
                ['pane2', 'pane3'].forEach(id => {
                    const n = id.slice(-1); const kws = Object.keys(allData[id]);
                    const t = document.getElementById(`${id}-tabs`);
                    t.innerHTML = kws.map((kw, i) => `<button class="tab-btn ${i===0?'active':''}" onclick="switchTab(${n},'${kw}',this)">${kw}</button>`).join('');
                    switchTab(n, kws[0], t.firstChild);
                });
                const ts = `업데이트: ${allData.last_updated.substring(11, 16)}`;
                ['1','2','3'].forEach(n => document.getElementById(`time-${n}`).innerText = ts);
            } catch (e) { document.querySelectorAll('.scroll-content').forEach(el => el.innerText = "데이터 로딩 실패."); }
        }
        init();
    </script>
</body>
</html>
