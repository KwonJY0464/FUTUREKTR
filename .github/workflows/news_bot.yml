name: News Aggregator Bot

on:
  schedule:
    - cron: '*/30 * * * *'  # 30분마다 무조건 실행
  workflow_dispatch: # 수동 실행 버튼 (필수)
  
jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Set up Python

        uses: actions/setup-python@v4

        with:

          python-version: '3.10'

      - name: Install dependencies

        run: pip install requests google-genai

      - name: Run Scraper

        env:

          NAVID: ${{ secrets.NAVID }}

          NAVPASS: ${{ secrets.NAVPASS }}

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

        run: python update_news.py

      - name: Commit and Push

        run: |

          git config --global user.name "KTR-News-Bot"

          git config --global user.email "bot@github.com"

          git add news.json

          git commit -m "Auto-update with AI summary" || exit 0

          git pull --rebase origin main

          git push
