name: Update Target Radar DB

on:
  schedule:
    # 매일 오전 8시, 낮 12시, 오후 6시 (KST 기준)에 DB 갱신
   - cron: '0 0 * * 1,5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests
      - name: Run Radar Update Script
        env:
          ASSEMBLY_API_KEY: ${{ secrets.ASSEMBLY_API_KEY }}
        run: python update_radar.py
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add radar_db.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update radar DB" && git push)
